# B6x SDK API-Register Mapping Configuration
# This file maps driver APIs to their corresponding hardware registers
# Generated from analysis of SDK drivers/api/*.h and drivers/src/*.c

mappings:
# ============================================================================
# UART - Universal Asynchronous Receiver/Transmitter
# ============================================================================

- access_type: configure
  api: uart_init
  confidence: 1.0
  fields:
  - RXEN
  note: Initialize UART port (enable clock, reset, IO func map)
  registers:
  - IOPAD_CTRL
  - CSC_PIO
  - RCC_APBCLK_EN_RUN
  - RCC_APBRST_CTRL
  - GPIO_PIN

- access_type: write
  api: uart_deinit
  confidence: 1.0
  fields: []
  note: Deinitialize UART port (disable clock)
  registers:
  - RCC_APBCLK_EN_RUN
  - RCC_APBRST_CTRL

- access_type: configure
  api: uart_hwfc
  confidence: 1.0
  fields:
  - AFCEN
  - RTSCTRL
  note: Configure UART hardware flow control (IO func map, enable auto RTS)
  registers:
  - UART_MCR
  - IOPAD_CTRL
  - CSC_PIO

- access_type: configure
  api: uart_conf
  confidence: 1.0
  fields:
  - DIV_MANTISSA
  - DIV_FRACTION
  - DATA_BITS
  - STOP_BITS
  - PARITY
  - RXEN
  - BRWEN
  note: Configure UART params (baudrate and ctrl bits)
  registers:
  - UART_LCR
  - UART_BRR
  - UART_FCR

- access_type: configure
  api: uart_fctl
  confidence: 1.0
  fields:
  - FIFOEN
  - RFRST
  - TFRST
  - RXTL
  - TXTL
  - RTO
  - RTOEN
  note: Configure UART fifo level and receive timeout
  registers:
  - UART_FCR
  - UART_RTOR
  - UART_LCR
  - UART_IDR
  - UART_IER

- access_type: configure
  api: uart_mctl
  confidence: 1.0
  fields:
  - DMAEN
  - RTO_SEL
  note: Configure UART mode control (DMA enable)
  registers:
  - UART_MCR
  - UART_LCR

- access_type: write
  api: uart_putc
  confidence: 1.0
  fields:
  - TBEM
  note: Transmit one byte data through UART
  registers:
  - UART_SR
  - UART_TBR

- access_type: read
  api: uart_getc
  confidence: 1.0
  fields:
  - DR
  note: Get the most recent received data
  registers:
  - UART_SR
  - UART_RBR

- access_type: read
  api: uart_wait
  confidence: 1.0
  fields:
  - TBEM
  - BUSY
  note: Wait UART transmit finish (idle state)
  registers:
  - UART_SR

- access_type: write
  api: uart_send
  confidence: 1.0
  fields:
  - TBEM
  note: Transmit bytes data (Blocking Mode)
  registers:
  - UART_SR
  - UART_TBR

- access_type: configure
  api: uart_update_baud
  confidence: 1.0
  fields:
  - DIV_MANTISSA
  - DIV_FRACTION
  - BRWEN
  note: Update UART baudrate (reset and restore params)
  registers:
  - UART_LCR
  - UART_BRR
  - UART_FCR
  - UART_MCR
  - UART_IER
  - RCC_APBCLK_EN_RUN
  - RCC_APBRST_CTRL
  - IOPAD_CTRL
  - CSC_PIO

