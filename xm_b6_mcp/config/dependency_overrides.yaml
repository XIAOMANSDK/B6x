- api: i2c_init
  call_sequence:
  - 'RCC_APBCLK_EN(APB_I2C_BIT)'
  - 'I2C->SRST = 0x07  # Software reset I2C'
  - 'iom_ctrl(io_sda, IOM_SEL_GPIO | IOM_PULLDOWN | IOM_INPUT)'
  - '# CRITICAL: Delay 180us for GPIO stabilization (750 iterations at 64MHz)'
  - 'for (delay_cnt = 750; delay_cnt--; __NOP()) { }'
  - '# Check for external pull-up'
  - 'if ((GPIO->PIN >> io_sda) & 0x01) { io_ctrl = IOM_SEL_CSC | IOM_DRV_LVL1 | IOM_INPUT | IOM_OPENDRAIN; }'
  - 'csc_output(io_scl, CSC_I2C_SCL)'
  - 'csc_input(io_scl, CSC_I2C_SCL)'
  - 'csc_output(io_sda, CSC_I2C_SDA)'
  - 'csc_input(io_sda, CSC_I2C_SDA)'
  - 'iom_ctrl(io_scl, io_ctrl)'
  - 'iom_ctrl(io_sda, io_ctrl)'
  - 'I2C->CLK.Word = sclk  # Set I2C clock divider'
  - 'I2C_ENABLE()  # Enable I2C peripheral'
  notes:
  - CRITICAL: 180us delay required after initial GPIO config
  - Delay allows external pull-up detection
  - If external pull-up detected, internal pull-up is disabled
  pre_requisites:
  - csc_input
  - csc_output
  - iom_ctrl
  requires_clock: true
  requires_gpio: true
  requires_dma: false
  requires_interrupt: false
  see_also:
  - i2c_deinit
  - i2c_start
  - i2c_stop
  parameters:
  - name: io_scl
    type: uint8_t
    description: "SCL pin number"
  - name: io_sda
    type: uint8_t
    description: "SDA pin number"
  - name: sclk
    type: uint8_t
    description: "Clock configuration value"
  source_file: i2c.c
  source_line: 67

