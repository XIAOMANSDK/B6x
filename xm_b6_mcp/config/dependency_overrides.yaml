- api: dma_init
  call_sequence:
  - '# Check if already initialized'
  - 'if (DMA->CTRLBASE_POINTER.Word) { return; }'
  - 'RCC_APBCLK_EN(APB_DMAC_BIT)  # Enable DMA APB clock'
  - 'RCC_APBRST_REQ(APB_DMAC_BIT)  # Request DMA reset'
  - 'DMA->CTRLBASE_POINTER.Word = (uint32_t)&dma_ctrl_base  # Set DMA control structure base address'
  - 'DMA->CFG.Word = DMA_CFG_HPROT(7) | DMA_CFG_EN_BIT  # Enable DMA controller with channel protection'
  notes:
  - Check if already initialized before proceeding
  - Must be called before dma_chnl_init
  requires_clock: true
  requires_gpio: false
  requires_dma: false
  requires_interrupt: false
  see_also:
  - dma_deinit
  - dma_chnl_init
  source_file: dma.c
  source_line: 40

