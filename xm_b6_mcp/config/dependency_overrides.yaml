- api: dma_chnl_init
  call_sequence:
  - 'dma_init()  # Must be called first'
  - 'if (chidx < DMA_CH_MAX) {'
  - '  DMA->USEBURST_SET = (1UL << chidx)  # Disable DMA single transfer (use burst)'
  - '  DMA->REQMSK_CLR = (1UL << chidx)  # Clear channel request mask, allow DMA requests'
  - '  # Configure DMA channel multiplexing'
  - '  arr = (chidx / 4)'
  - '  lsh = (chidx % 4) * 8'
  - '  DMACHCFG->CHSEL[arr] = (DMACHCFG->CHSEL[arr] & ~(0x3FUL << lsh)) | ((uint32_t)chsel << lsh)'
  - '}'
  notes:
  - DMA controller must be initialized before configuring channels
  - Channel index must be less than DMA_CH_MAX
  pre_requisites:
  - dma_init
  requires_clock: true
  requires_gpio: false
  requires_dma: true
  requires_interrupt: false
  see_also:
  - dma_init
  - dma_chnl_conf
  parameters:
  - name: chidx
    type: uint8_t
    description: "Channel index (0-7)"
  - name: chsel
    type: uint8_t
    description: "Channel function selection"
  source_file: dma.c
  source_line: 75

- api: dma_deinit
  call_sequence:
  - 'RCC_APBCLK_DIS(APB_DMAC_BIT)'
  - 'RCC_APBRST_REQ(APB_DMAC_BIT)'
